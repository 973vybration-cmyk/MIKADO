<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIKADO NHL</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">

<!-- CSS externe -->
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <div class="logo">MIKADO <span>NHL</span></div>
  <div class="date-badge" id="header-date"></div>
  <button class="load-btn" id="load-btn">Charger les matchs</button>
</header>

<main>
  <div id="status-bar">
    <div class="spinner" id="spinner"></div>
    <span id="status-msg">Clique sur "Charger les matchs" pour démarrer.</span>
  </div>

  <div id="legend" style="display:none"></div>

  <div id="matches-container">
    <div class="empty">
      <span class="big">NHL</span>
      Clique sur "Charger les matchs" pour voir l'analyse du jour
    </div>
  </div>
</main>

<!-- JS modules -->
<script src="js/api.js"></script>
<script src="js/cache.js"></script>
<script src="js/stats.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>

</body>
</html>
