<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIKADO NHL</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">MIKADO <span>NHL</span></div>
  <div class="date-badge" id="header-date"></div>
  <button class="load-btn" id="load-btn" onclick="loadAll()">Charger les matchs</button>
</header>

<div class="page-nav">
  <button class="nav-tab active" id="tab-matchs" onclick="showPage('matchs')">Matchs</button>
  <button class="nav-tab" id="tab-compos" onclick="showPage('compos')">Compos</button>
</div>

<main>
  <div id="page-matchs">
    <div id="status-bar">
      <div class="spinner" id="spinner"></div>
      <span id="status-msg">Clique sur "Charger les matchs" pour démarrer.</span>
    </div>
    <div id="legend" style="display:none">
      <div class="legend">
        <span><div class="dot" style="background:#5b9cf6"></div> Centre (C)</span>
        <span><div class="dot" style="background:#4caf7d"></div> Ailier (LW/RW)</span>
        <span><div class="dot" style="background:#c8a84b"></div> Défenseur (D)</span>
        <span><div class="dot" style="background:#e05252"></div> Gardien (G)</span>
        <span style="margin-left:12px"><span style="color:var(--green);font-weight:500">■</span> ≥ 3 pts</span>
        <span><span style="color:var(--text)">■</span> 1-2 pts</span>
        <span><span style="color:var(--muted)">■</span> 0 pts</span>
      </div>
    </div>
    <div id="matches-container">
      <div class="empty">
        <span class="big">NHL</span>
        Clique sur "Charger les matchs" pour voir l'analyse du jour
      </div>
    </div>
  </div>

  <div id="page-compos" style="display:none">
    <div id="compos-status-bar" style="display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;font-size:13px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.05em;">
      <div class="spinner" id="compos-spinner"></div>
      <span id="compos-status-msg">Chargement des compositions...</span>
    </div>
    <div id="compos-container"></div>
  </div>
</main>

<script src="app.js"></script>
<script src="matchs.js"></script>
<script src="compos.js"></script>
</body>
</html>
